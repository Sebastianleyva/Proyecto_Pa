<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Servicios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

  <h2>CRUD Servicios</h2>
  <a href="/dashboard" class="text-center">Regresar</a>

  <form id="form">
    <input class="form-control mb-2" name="tipo_servicio" placeholder="Servicio" required>
    <input class="form-control mb-2" name="ubicacion" placeholder="Ubicación" required>
    <input class="form-control mb-2" name="precio" type="number" placeholder="Precio" required>
    <button class="btn btn-success">Guardar</button>
  </form>

  <table class="table mt-4">
    <thead>
      <tr>
        <th>Servicio</th>
        <th>Ubicación</th>
        <th>Precio</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <script>
    const tabla = document.getElementById('tabla');
    const form = document.getElementById('form');

    let editando = false;
    let idEditar = null;

    // cargar datos
    function cargar() {

      fetch('/servicios')
        .then(res => {
          if (!res.ok) throw new Error("Error en respuesta");
          return res.text();
        })
        .then(data => {
          tabla.innerHTML = '';

          data.forEach(s => {
            const row = document.createElement('tr');

            row.innerHTML = `
              <td>${s.tipo_servicio}</td>
              <td>${s.ubicacion}</td>
              <td>${s.precio}</td>
              <td>
                <button class="btn btn-warning btn-sm">Editar</button>
                <button class="btn btn-danger btn-sm">Eliminar</button>
              </td>
            `;

            // eventos sin inline JS 
            row.querySelector('.btn-warning').onclick = () =>
              editar(s.id, s.tipo_servicio, s.ubicacion, s.precio);

            row.querySelector('.btn-danger').onclick = () =>
              eliminar(s.id);

            tabla.appendChild(row);
          });
        })
        .catch(err => {
          console.error(err);
          tabla.innerHTML = '<tr><td colspan="4">Error cargando datos</td></tr>';
        });
    }

    // guardar
    form.addEventListener('submit', e => {
      e.preventDefault();

      const data = new FormData(form);

      if (editando) {
        fetch('/servicios/' + idEditar, {
          method: 'PUT',
          body: new URLSearchParams(data)
        })
          .then(() => {
            editando = false;
            idEditar = null;
            form.reset();
            cargar();
          });

      } else {
        fetch('/servicios', {
          method: 'POST',
          body: new URLSearchParams(data)
        })
          .then(() => {
            form.reset();
            cargar();
          });
      }
    });

    // editar
    function editar(id, servicio, ubicacion, precio) {
      form.tipo_servicio.value = servicio;
      form.ubicacion.value = ubicacion;
      form.precio.value = precio;

      editando = true;
      idEditar = id;
    }

    // eliminar
    function eliminar(id) {
      fetch('/servicios/' + id, {
        method: 'DELETE'
      })
        .then(() => cargar());
    }

    // 🔄 iniciar
    cargar();
  </script>

</body>

</html>
